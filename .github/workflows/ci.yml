name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nextpress_test
  TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nextpress_test
  NEXTAUTH_SECRET: ci-test-secret-not-for-production-use-only
  NEXTAUTH_URL: http://localhost:3000
  ADMIN_PASSWORD: ci-test-password-12chars
  CRON_SECRET: ci-cron-secret
  REVALIDATION_SECRET: ci-revalidation-secret

jobs:
  # ── Fast checks (no DB) ──
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint
      - run: pnpm turbo typecheck

  # ── Unit tests (no DB) ──
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @nextpress/core vitest run --reporter=verbose --coverage
        env:
          SKIP_DB: "true"
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: packages/core/coverage/

  # ── Integration tests (needs DB) ──
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nextpress_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @nextpress/db prisma migrate deploy
      - run: pnpm --filter @nextpress/db prisma db seed
      - run: pnpm --filter @nextpress/core vitest run --reporter=verbose
      - run: pnpm --filter @nextpress/api vitest run --reporter=verbose

  # ── E2E tests (full app) ──
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [integration-tests]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nextpress_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @nextpress/db prisma generate
      - run: pnpm --filter @nextpress/db prisma migrate deploy
      - run: pnpm --filter @nextpress/db prisma db seed
      - run: npx playwright install --with-deps chromium
      - name: Build app
        run: pnpm --filter web build
        env:
          # Next.js build needs these at build time
          SKIP_ENV_VALIDATION: "true"
      - name: Run E2E tests
        run: pnpm --filter web playwright test
      - name: Upload E2E report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ── Gate: all checks must pass before merge ──
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    if: always()
    needs: [lint-and-typecheck, unit-tests, integration-tests, e2e-tests]
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint-and-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.integration-tests.result }}" != "success" ]] || \
             [[ "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
